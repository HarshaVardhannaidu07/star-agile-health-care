apiVersion: apps/v1
kind: Deployment
metadata:
  name: medicure-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: medicure
  template:
    metadata:
      labels:
        app: medicure
    spec:
      containers:
        - name: medicure-container
          image: cloudthree372/medicure-app:12
          ports:
            - containerPort: 8081
